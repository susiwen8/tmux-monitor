name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14

    steps:
      - name: Resolve tag
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Validate tag against VERSION
        shell: bash
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          EXPECTED_TAG="v${VERSION}"
          ACTUAL_TAG="${{ steps.meta.outputs.tag }}"
          if [[ "$EXPECTED_TAG" != "$ACTUAL_TAG" ]]; then
            echo "VERSION ($VERSION) does not match tag ($ACTUAL_TAG)." >&2
            exit 1
          fi

      - name: Verify repository before release
        run: ./scripts/verify.sh

      - name: Package release artifact
        run: ./scripts/package_release.sh

      - name: Extract release notes
        shell: bash
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          ./scripts/extract_release_notes.sh "$TAG" > "$NOTES_FILE" || true
          if [[ ! -s "$NOTES_FILE" ]]; then
            VERSION="${TAG#v}"
            cat > "$NOTES_FILE" <<EOF
          Release ${VERSION}

          See CHANGELOG.md for details.
          EOF
          fi
          echo "RELEASE_NOTES_FILE=$NOTES_FILE" >> "$GITHUB_ENV"

      - name: Upload release artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: tmux-monitor-${{ steps.meta.outputs.tag }}
          path: |
            dist/*.zip
            dist/*sha256.txt

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          VERSION="${TAG#v}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.zip dist/*sha256.txt --clobber
            gh release edit "$TAG" --title "Tmux Monitor ${VERSION}" --notes-file "$RELEASE_NOTES_FILE"
          else
            gh release create "$TAG" dist/*.zip dist/*sha256.txt \
              --target "$GITHUB_SHA" \
              --title "Tmux Monitor ${VERSION}" \
              --notes-file "$RELEASE_NOTES_FILE"
          fi
